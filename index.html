<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>出货管理系统</title>
  <style>
    :root {
      --bg: #f7f8fb;
      --card: #ffffff;
      --text: #1f2937;
      --muted: #6b7280;
      --line: #e5e7eb;
      --primary: #2563eb;
      --primary-dark: #1d4ed8;
      --danger: #dc2626;
      --success: #059669;
      --shadow: 0 8px 24px rgba(15, 23, 42, 0.08);
      --radius: 16px;
    }

    * { box-sizing: border-box; }

    body {
      margin: 0;
      font-family: Arial, Helvetica, sans-serif;
      background: var(--bg);
      color: var(--text);
    }

    .container {
      max-width: 1400px;
      margin: 0 auto;
      padding: 24px;
    }

    .header {
      margin-bottom: 18px;
    }

    .header h1 {
      margin: 0 0 8px;
      font-size: 30px;
    }

    .header p {
      margin: 0;
      color: var(--muted);
      line-height: 1.6;
    }

    .stack {
      display: flex;
      flex-direction: column;
      gap: 20px;
    }

    .card {
      background: var(--card);
      border-radius: var(--radius);
      box-shadow: var(--shadow);
      padding: 22px;
    }

    .card h2 {
      margin: 0 0 18px;
      font-size: 24px;
    }

    form .form-grid {
      display: grid;
      grid-template-columns: repeat(4, minmax(180px, 1fr));
      gap: 16px;
    }

    .full {
      grid-column: 1 / -1;
    }

    label {
      display: block;
      font-size: 13px;
      color: var(--muted);
      margin-bottom: 6px;
      font-weight: 600;
      line-height: 1.4;
      word-break: keep-all;
      white-space: normal;
    }

    input, select, textarea {
      width: 100%;
      padding: 12px 12px;
      border: 1px solid var(--line);
      border-radius: 10px;
      font-size: 14px;
      outline: none;
      background: #fff;
    }

    input:focus, select:focus, textarea:focus {
      border-color: var(--primary);
      box-shadow: 0 0 0 3px rgba(37, 99, 235, 0.12);
    }

    textarea {
      min-height: 90px;
      resize: vertical;
    }

    .actions {
      display: flex;
      gap: 10px;
      margin-top: 18px;
      flex-wrap: wrap;
    }

    button {
      border: 0;
      border-radius: 10px;
      padding: 11px 16px;
      cursor: pointer;
      font-size: 14px;
      font-weight: 700;
    }

    .btn-primary {
      background: var(--primary);
      color: white;
    }

    .btn-primary:hover {
      background: var(--primary-dark);
    }

    .btn-secondary {
      background: #e5e7eb;
      color: #111827;
    }

    .toolbar {
      display: flex;
      gap: 12px;
      align-items: end;
      flex-wrap: wrap;
      margin-bottom: 14px;
    }

    .toolbar > div {
      min-width: 160px;
      flex: 0 1 200px;
    }

    .status {
      font-size: 14px;
      margin-top: 10px;
      min-height: 20px;
    }

    .status.success { color: var(--success); }
    .status.error { color: var(--danger); }

    .table-wrap {
      overflow: auto;
      border: 1px solid var(--line);
      border-radius: 14px;
    }

    table {
      width: 100%;
      border-collapse: collapse;
      min-width: 1550px;
      background: white;
    }

    th, td {
      border-bottom: 1px solid var(--line);
      padding: 10px 8px;
      text-align: left;
      vertical-align: top;
      font-size: 13px;
    }

    th {
      background: #f9fafb;
      position: sticky;
      top: 0;
      z-index: 1;
    }

    tr:hover td {
      background: #fcfcfd;
    }

    .row-actions {
      display: flex;
      gap: 8px;
      flex-wrap: wrap;
    }

    .btn-small {
      padding: 7px 10px;
      font-size: 12px;
      font-weight: 700;
    }

    .btn-edit {
      background: #dbeafe;
      color: #1d4ed8;
    }

    .btn-delete {
      background: #fee2e2;
      color: #b91c1c;
    }

    .pill {
      display: inline-block;
      background: #eef2ff;
      color: #4338ca;
      border-radius: 999px;
      padding: 4px 8px;
      font-size: 12px;
      font-weight: 700;
    }

    @media (max-width: 1200px) {
      form .form-grid {
        grid-template-columns: repeat(3, minmax(160px, 1fr));
      }
    }

    @media (max-width: 900px) {
      form .form-grid {
        grid-template-columns: repeat(2, minmax(160px, 1fr));
      }
    }

    @media (max-width: 720px) {
      form .form-grid {
        grid-template-columns: 1fr;
      }

      .container {
        padding: 14px;
      }

      .card {
        padding: 16px;
      }

      .header h1 {
        font-size: 24px;
      }
    }
  </style>
</head>
<body>
  <div class="container">
    <div class="header">
      <h1>出货管理系统</h1>
      <p>员工打开同一个网址填写并保存，所有人都会看到最新数据。支持按年份和月份筛选。</p>
    </div>

    <div class="stack">
      <div class="card">
        <h2 id="formTitle">新增出货记录</h2>

        <form id="shipmentForm">
          <div class="form-grid">
            <div>
              <label for="customerName">客户名称</label>
              <input id="customerName" name="customerName" required />
            </div>

            <div>
              <label for="salesName">业务员名称</label>
              <input id="salesName" name="salesName" required />
            </div>

            <div>
              <label for="orderNo">订单号</label>
              <input id="orderNo" name="orderNo" required />
            </div>

            <div>
              <label for="containerType">柜型</label>
              <select id="containerType" name="containerType">
                <option value="">请选择</option>
                <option>20GP</option>
                <option>40GP</option>
                <option>40HQ</option>
                <option>45HQ</option>
                <option>LCL</option>
              </select>
            </div>

            <div>
              <label for="containerQty">几个柜</label>
              <input id="containerQty" name="containerQty" type="number" min="0" step="1" />
            </div>

            <div>
              <label for="blNo">提单号</label>
              <input id="blNo" name="blNo" />
            </div>

            <div>
              <label for="etd">ETD</label>
              <input id="etd" name="etd" type="date" />
            </div>

            <div>
              <label for="eta">ETA</label>
              <input id="eta" name="eta" type="date" />
            </div>

            <div>
              <label for="port">港口</label>
              <input id="port" name="port" />
            </div>

            <div>
              <label for="freight">运费</label>
              <input id="freight" name="freight" type="number" min="0" step="0.01" />
            </div>

            <div>
              <label for="otherCost">其它费用</label>
              <input id="otherCost" name="otherCost" type="number" min="0" step="0.01" />
            </div>

            <div>
              <label for="customsAmount">报关金额</label>
              <input id="customsAmount" name="customsAmount" type="number" min="0" step="0.01" />
            </div>

            <div>
              <label for="receivedAmount">已收金额</label>
              <input id="receivedAmount" name="receivedAmount" type="number" min="0" step="0.01" />
            </div>

            <div>
              <label for="pendingAmount">待收金额</label>
              <input id="pendingAmount" name="pendingAmount" type="number" min="0" step="0.01" />
            </div>

            <div>
              <label for="year">年份</label>
              <select id="year" name="year" required></select>
            </div>

            <div>
              <label for="month">月份</label>
              <select id="month" name="month" required></select>
            </div>

            <div class="full">
              <label for="remarks">备注</label>
              <textarea id="remarks" name="remarks"></textarea>
            </div>
          </div>

          <div class="actions">
            <button type="submit" class="btn-primary" id="submitBtn">保存记录</button>
            <button type="button" class="btn-secondary" id="resetBtn">重置</button>
          </div>

          <div id="formStatus" class="status"></div>
        </form>
      </div>

      <div class="card">
        <h2>出货记录</h2>

        <div class="toolbar">
          <div>
            <label for="filterYear">筛选年份</label>
            <select id="filterYear"></select>
          </div>

          <div>
            <label for="filterMonth">筛选月份</label>
            <select id="filterMonth"></select>
          </div>

          <div>
            <label>&nbsp;</label>
            <button type="button" class="btn-secondary" id="clearFilters">清空筛选</button>
          </div>

          <div style="margin-left:auto; min-width:auto;">
            <label>&nbsp;</label>
            <span class="pill" id="recordCount">0 条</span>
          </div>
        </div>

        <div class="table-wrap">
          <table>
            <thead>
              <tr>
                <th>客户</th>
                <th>业务员</th>
                <th>订单号</th>
                <th>柜型</th>
                <th>数量</th>
                <th>提单号</th>
                <th>ETD</th>
                <th>ETA</th>
                <th>港口</th>
                <th>运费</th>
                <th>其它费用</th>
                <th>报关金额</th>
                <th>已收金额</th>
                <th>待收金额</th>
                <th>年份</th>
                <th>月份</th>
                <th>备注</th>
                <th>更新时间</th>
                <th>操作</th>
              </tr>
            </thead>
            <tbody id="recordsBody">
              <tr><td colspan="19">加载中...</td></tr>
            </tbody>
          </table>
        </div>
      </div>
    </div>
  </div>

  <script type="module">
    import { db } from './firebase-config.js';
    import {
      collection,
      addDoc,
      updateDoc,
      deleteDoc,
      doc,
      onSnapshot,
      serverTimestamp,
      query,
      orderBy
    } from 'https://www.gstatic.com/firebasejs/10.12.2/firebase-firestore.js';

    const shipmentsRef = collection(db, 'shipments');

    const years = ['2025', '2026', '2027', '2028', '2029', '2030'];
    const months = ['January', 'February', 'March', 'April', 'May', 'June', 'July', 'August', 'September', 'October', 'November', 'December'];

    const form = document.getElementById('shipmentForm');
    const formTitle = document.getElementById('formTitle');
    const submitBtn = document.getElementById('submitBtn');
    const resetBtn = document.getElementById('resetBtn');
    const formStatus = document.getElementById('formStatus');
    const recordsBody = document.getElementById('recordsBody');
    const recordCount = document.getElementById('recordCount');
    const filterYear = document.getElementById('filterYear');
    const filterMonth = document.getElementById('filterMonth');
    const clearFilters = document.getElementById('clearFilters');

    let editingId = null;
    let allRecords = [];

    function populateSelect(select, values, withAll = false) {
      select.innerHTML = '';
      if (withAll) {
        const opt = document.createElement('option');
        opt.value = '';
        opt.textContent = '全部';
        select.appendChild(opt);
      }
      values.forEach(v => {
        const opt = document.createElement('option');
        opt.value = v;
        opt.textContent = v;
        select.appendChild(opt);
      });
    }

    function setStatus(message, type = 'success') {
      formStatus.className = 'status ' + type;
      formStatus.textContent = message;
    }

    function resetForm() {
      form.reset();
      document.getElementById('year').value = '2026';
      editingId = null;
      formTitle.textContent = '新增出货记录';
      submitBtn.textContent = '保存记录';
      formStatus.textContent = '';
      formStatus.className = 'status';
    }

    function escapeHtml(str = '') {
      return String(str)
        .replaceAll('&', '&amp;')
        .replaceAll('<', '&lt;')
        .replaceAll('>', '&gt;')
        .replaceAll('"', '&quot;')
        .replaceAll("'", '&#39;');
    }

    function formatTime(ts) {
      if (!ts || !ts.seconds) return '';
      return new Date(ts.seconds * 1000).toLocaleString();
    }

    function fillForm(record) {
      for (const [key, value] of Object.entries(record)) {
        const el = form.elements[key];
        if (el && value !== undefined && value !== null) {
          el.value = value;
        }
      }
      editingId = record.id;
      formTitle.textContent = '编辑出货记录';
      submitBtn.textContent = '更新记录';
      window.scrollTo({ top: 0, behavior: 'smooth' });
      setStatus('正在编辑：' + record.orderNo, 'success');
    }

    function renderTable() {
      const fy = filterYear.value;
      const fm = filterMonth.value;

      const filtered = allRecords.filter(item => {
        const yearOk = !fy || item.year === fy;
        const monthOk = !fm || item.month === fm;
        return yearOk && monthOk;
      });

      recordCount.textContent = `${filtered.length} 条`;

      if (!filtered.length) {
        recordsBody.innerHTML = '<tr><td colspan="19">暂无记录</td></tr>';
        return;
      }

      recordsBody.innerHTML = filtered.map(item => `
        <tr>
          <td>${escapeHtml(item.customerName)}</td>
          <td>${escapeHtml(item.salesName)}</td>
          <td>${escapeHtml(item.orderNo)}</td>
          <td>${escapeHtml(item.containerType)}</td>
          <td>${escapeHtml(item.containerQty)}</td>
          <td>${escapeHtml(item.blNo)}</td>
          <td>${escapeHtml(item.etd || '')}</td>
          <td>${escapeHtml(item.eta || '')}</td>
          <td>${escapeHtml(item.port)}</td>
          <td>${escapeHtml(item.freight)}</td>
          <td>${escapeHtml(item.otherCost)}</td>
          <td>${escapeHtml(item.customsAmount)}</td>
          <td>${escapeHtml(item.receivedAmount)}</td>
          <td>${escapeHtml(item.pendingAmount)}</td>
          <td>${escapeHtml(item.year)}</td>
          <td>${escapeHtml(item.month)}</td>
          <td>${escapeHtml(item.remarks || '')}</td>
          <td>${escapeHtml(formatTime(item.updatedAt))}</td>
          <td>
            <div class="row-actions">
              <button type="button" class="btn-small btn-edit" data-edit="${item.id}">编辑</button>
              <button type="button" class="btn-small btn-delete" data-delete="${item.id}">删除</button>
            </div>
          </td>
        </tr>
      `).join('');

      recordsBody.querySelectorAll('[data-edit]').forEach(btn => {
        btn.addEventListener('click', () => {
          const target = allRecords.find(r => r.id === btn.dataset.edit);
          if (target) fillForm(target);
        });
      });

      recordsBody.querySelectorAll('[data-delete]').forEach(btn => {
        btn.addEventListener('click', async () => {
          if (!confirm('确认删除这条记录吗？')) return;
          try {
            await deleteDoc(doc(db, 'shipments', btn.dataset.delete));
            setStatus('删除成功');
            if (editingId === btn.dataset.delete) resetForm();
          } catch (err) {
            setStatus('删除失败：' + err.message, 'error');
          }
        });
      });
    }

    populateSelect(document.getElementById('year'), years);
    populateSelect(document.getElementById('month'), months);
    populateSelect(filterYear, years, true);
    populateSelect(filterMonth, months, true);
    document.getElementById('year').value = '2026';

    form.addEventListener('submit', async (e) => {
      e.preventDefault();

      const data = {
        customerName: form.customerName.value.trim(),
        salesName: form.salesName.value.trim(),
        orderNo: form.orderNo.value.trim(),
        containerType: form.containerType.value,
        containerQty: form.containerQty.value ? Number(form.containerQty.value) : '',
        blNo: form.blNo.value.trim(),
        etd: form.etd.value,
        eta: form.eta.value,
        port: form.port.value.trim(),
        freight: form.freight.value ? Number(form.freight.value) : '',
        otherCost: form.otherCost.value ? Number(form.otherCost.value) : '',
        customsAmount: form.customsAmount.value ? Number(form.customsAmount.value) : '',
        receivedAmount: form.receivedAmount.value ? Number(form.receivedAmount.value) : '',
        pendingAmount: form.pendingAmount.value ? Number(form.pendingAmount.value) : '',
        year: form.year.value,
        month: form.month.value,
        remarks: form.remarks.value.trim(),
        updatedAt: serverTimestamp()
      };

      try {
        if (editingId) {
          await updateDoc(doc(db, 'shipments', editingId), data);
          setStatus('更新成功');
        } else {
          data.createdAt = serverTimestamp();
          await addDoc(shipmentsRef, data);
          setStatus('保存成功');
        }
        resetForm();
      } catch (err) {
        setStatus('保存失败：' + err.message, 'error');
      }
    });

    resetBtn.addEventListener('click', resetForm);
    filterYear.addEventListener('change', renderTable);
    filterMonth.addEventListener('change', renderTable);
    clearFilters.addEventListener('click', () => {
      filterYear.value = '';
      filterMonth.value = '';
      renderTable();
    });

    onSnapshot(query(shipmentsRef, orderBy('updatedAt', 'desc')), (snapshot) => {
      allRecords = snapshot.docs.map(d => ({ id: d.id, ...d.data() }));
      renderTable();
    }, (err) => {
      recordsBody.innerHTML = `<tr><td colspan="19">读取失败：${escapeHtml(err.message)}</td></tr>`;
    });
  </script>
</body>
</html>
